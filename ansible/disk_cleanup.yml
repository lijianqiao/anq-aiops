---
- name: Disk cleanup
  hosts: "{{ target_host }}"
  gather_facts: false
  vars:
    cleanup_path: "{{ path | default('/tmp') }}"
    min_age: "{{ min_age_days | default(7) }}"
  tasks:
    - name: Find old files
      ansible.builtin.find:
        paths: "{{ cleanup_path }}"
        age: "{{ min_age }}d"
        file_type: file
      register: old_files

    - name: Show files to delete
      ansible.builtin.debug:
        msg: "Would delete {{ old_files.files | length }} files in {{ cleanup_path }}"

    - name: Remove files
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ old_files.files }}"
      when: old_files.files | length > 0

    - name: Check disk usage after cleanup
      ansible.builtin.shell:
        cmd: "df --output=pcent {{ cleanup_path }} | tail -1 | tr -d ' %'"
      register: disk_usage_result
      # 必须显式打开，否则 verify (--check) 模式下 shell 会被跳过，下游 debug 拿不到值
      check_mode: false
      changed_when: false

    - name: Show disk usage for verifier
      ansible.builtin.debug:
        msg: "disk_usage={{ disk_usage_result.stdout }}"
