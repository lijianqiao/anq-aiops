services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.25.0
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postgres
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.33.0
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8080:8080"
    depends_on:
      - temporal

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  aiops:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      temporal:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./ansible:/app/ansible
      # SSH key 挂进容器，让 ansible 能免密登录目标主机
      - /opt/aiops/ssh-keys:/root/.ssh:ro

  meta-monitor:
    build:
      context: .
      dockerfile: meta_monitor/Dockerfile
    environment:
      META_AIOPS_URL: ${META_AIOPS_URL:-http://aiops:8000}
      META_TEMPORAL_ADDR: ${META_TEMPORAL_ADDR:-}
      META_REDIS_ADDR: ${META_REDIS_ADDR:-redis:6379}
      META_INTERVAL_SEC: ${META_INTERVAL_SEC:-60}
      META_FEISHU_WEBHOOK_URL: ${META_FEISHU_WEBHOOK_URL:-}
      LLM_PRIMARY_BASE_URL: ${LLM_PRIMARY_BASE_URL:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # 故意不加 depends_on：meta-monitor 应先于主应用发现故障，而不是等待主应用健康。
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
